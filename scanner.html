<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- ZXing รองรับทุก barcode format -->
  <script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.19.1/umd/index.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; font-family:Arial,sans-serif; }

    #video {
      width:100vw; height:65vh;
      object-fit:cover; display:block;
    }

    /* กรอบเล็ง */
    #aimBox {
      position:fixed; top:0; left:0;
      width:100vw; height:65vh;
      pointer-events:none; z-index:5;
    }
    #aimBox::after {
      content:'';
      position:absolute;
      top:50%; left:50%;
      transform:translate(-50%,-55%);
      width:240px; height:160px;   /* แนวนอนสำหรับ barcode แท่ง */
      border:3px solid #00ff00;
      border-radius:8px;
      box-shadow: 0 0 0 2000px rgba(0,0,0,0.4);
    }
    /* เส้นสแกน */
    #scanLine {
      position:fixed;
      left: calc(50% - 120px);
      width: 240px;
      height: 2px;
      background: #ff0000;
      z-index:6;
      animation: scanAnim 1.5s ease-in-out infinite;
    }
    @keyframes scanAnim {
      0%   { top: calc(65vh * 0.5 - 55px); }
      50%  { top: calc(65vh * 0.5 + 25px); }
      100% { top: calc(65vh * 0.5 - 55px); }
    }

    #statusBar {
      position:fixed; top:8px; left:0; right:0;
      text-align:center; color:#fff;
      font-size:13px; z-index:10;
      text-shadow:0 1px 4px #000;
      padding: 4px 8px;
    }

    #resultBox {
      height:35vh;
      background:#fff;
      overflow-y:auto;
      padding:10px 12px 80px;
    }
    #resultBox h4 {
      font-size:14px; color:#555;
      margin-bottom:8px;
    }
    #resultList { padding:0; margin:0; }
    #resultList li {
      list-style:none;
      font-size:17px; font-weight:bold;
      padding:12px 14px;
      margin-bottom:8px;
      border-radius:10px;
      border:2px solid #007bff;
      background:#f8fbff;
      cursor:pointer;
      word-break:break-all;
    }
    #resultList li.selected {
      background:#007bff; color:#fff;
    }

    #noResult {
      text-align:center; padding:20px;
      color:#aaa; font-size:14px;
      line-height:1.8;
    }

    #btnBar {
      position:fixed; bottom:0; left:0; right:0;
      display:flex; gap:8px;
      padding:10px 12px;
      padding-bottom:max(10px, env(safe-area-inset-bottom));
      background:#111;
    }
    #btnBar button {
      flex:1; padding:16px;
      font-size:17px; font-weight:bold;
      border:none; border-radius:12px; cursor:pointer;
    }
    #btnConfirm { background:#28a745; color:#fff; }
    #btnClose   { background:#dc3545; color:#fff; }
    #btnClear   { background:#555; color:#fff; flex:0.5; font-size:20px; }
  </style>
</head>
<body>

<div id="statusBar">🔍 กำลังสแกน...</div>
<video id="video" playsinline autoplay muted></video>
<div id="aimBox"></div>
<div id="scanLine"></div>

<div id="resultBox">
  <h4>📦 บาร์โค้ดที่พบ — แตะเพื่อเลือก</h4>
  <div id="noResult">
    ยังไม่พบบาร์โค้ด<br>
    ชี้กรอบสีเขียวไปที่บาร์โค้ด<br>
    <small style="color:#bbb">รองรับ: QR, Code128, Code39, EAN, UPC, DataMatrix ฯลฯ</small>
  </div>
  <ul id="resultList"></ul>
</div>

<div id="btnBar">
  <button id="btnConfirm" onclick="confirmSelect()">✔ เพิ่ม</button>
  <button id="btnClear"   onclick="clearList()">🗑</button>
  <button id="btnClose"   onclick="sendClose()">❌ ปิด</button>
</div>

<script>
  const params      = new URLSearchParams(location.search);
  const targetInput = params.get('target') || 'serial';

  const statusBar  = document.getElementById('statusBar');
  const resultList = document.getElementById('resultList');
  const noResult   = document.getElementById('noResult');

  const foundSet    = new Set();
  const selectedSet = new Set();

  // ZXing hints — เปิดทุก format
  const hints = new Map();
  const formats = [
    ZXing.BarcodeFormat.QR_CODE,
    ZXing.BarcodeFormat.CODE_128,
    ZXing.BarcodeFormat.CODE_39,
    ZXing.BarcodeFormat.CODE_93,
    ZXing.BarcodeFormat.EAN_13,
    ZXing.BarcodeFormat.EAN_8,
    ZXing.BarcodeFormat.UPC_A,
    ZXing.BarcodeFormat.UPC_E,
    ZXing.BarcodeFormat.ITF,
    ZXing.BarcodeFormat.DATA_MATRIX,
    ZXing.BarcodeFormat.PDF_417,
    ZXing.BarcodeFormat.AZTEC,
    ZXing.BarcodeFormat.CODABAR,
  ];
  hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, formats);
  hints.set(ZXing.DecodeHintType.TRY_HARDER, true);

  const codeReader = new ZXing.BrowserMultiFormatReader(hints, 300); // scan ทุก 300ms

  codeReader.listVideoInputDevices().then(devices => {
    if (!devices.length) throw new Error('ไม่พบกล้อง');

    // เลือกกล้องหลัง
    const back = devices.find(d =>
      /back|rear|environment/i.test(d.label)
    ) || devices[devices.length - 1];

    return codeReader.decodeFromVideoDevice(
      back.deviceId,
      'video',
      (result, err) => {
        if (result) {
          const val = result.getText();
          const fmt = result.getBarcodeFormat();
          const fmtName = ZXing.BarcodeFormat[fmt] || 'UNKNOWN';

          if (!foundSet.has(val)) {
            foundSet.add(val);
            addItem(val, fmtName);
          }
        }
        // err ปกติจะ throw ทุก frame ที่ไม่เจอ → ignore
      }
    );
  }).catch(err => {
    statusBar.textContent = '❌ ' + err.message;
    statusBar.style.color = '#ff4444';
  });

  function addItem(val, fmt) {
    noResult.style.display = 'none';
    statusBar.textContent = `✅ พบ ${foundSet.size} รายการ`;

    const li = document.createElement('li');

    const badge = `<span style="font-size:11px;font-weight:normal;
      background:#eef;color:#339;padding:2px 6px;border-radius:6px;
      margin-left:6px;">${fmt}</span>`;

    li.innerHTML = val + badge;
    li._value = val;

    li.onclick = () => {
      if (selectedSet.has(val)) {
        selectedSet.delete(val);
        li.classList.remove('selected');
      } else {
        selectedSet.add(val);
        li.classList.add('selected');
      }
      const n = selectedSet.size;
      document.getElementById('btnConfirm').textContent =
        n > 0 ? `✔ เพิ่ม (${n})` : '✔ เพิ่ม';
    };
    resultList.prepend(li);
  }

  function clearList() {
    foundSet.clear();
    selectedSet.clear();
    resultList.innerHTML = '';
    noResult.style.display = 'block';
    statusBar.textContent = '🔍 กำลังสแกน...';
    document.getElementById('btnConfirm').textContent = '✔ เพิ่ม';
  }

  function confirmSelect() {
    let vals = Array.from(selectedSet);
    if (!vals.length) {
      if (foundSet.size === 1) {
        vals = Array.from(foundSet);
      } else {
        alert('กรุณาแตะเลือกบาร์โค้ดก่อน');
        return;
      }
    }
    stopAndSend(vals);
  }

  function sendClose() {
    codeReader.reset();
    window.close();
    history.back();
  }

  function stopAndSend(vals) {
    codeReader.reset();
    const msg = { type: 'SCAN_RESULT', target: targetInput, values: vals };
    if (window.opener) {
      window.opener.postMessage(msg, '*');
      window.close();
    } else {
      localStorage.setItem('scanResult', JSON.stringify(msg));
      window.close();
      history.back();
    }
  }
</script>
</body>
</html>
